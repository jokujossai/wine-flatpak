name: libei
buildsystem: meson
build-options:
  env:
    PYTHONPATH: /app/extensions/gamescope/lib/python3.13/site-packages:/usr/lib/python3.13/site-packages
config-opts:
  - -Dtests=disabled
  - -Dliboeffis=disabled
sources:
  - type: archive
    # renovate: datasource=gitlab-tags depName=libei packageName=libinput/libei versioning=loose extractVersion=^(?<version>\d+\.\d+\.\d+)$ registryUrl=https://gitlab.freedesktop.org shape=double
    url: https://gitlab.freedesktop.org/libinput/libei/-/archive/1.6.0/libei-1.6.0.tar.gz
    sha256: 81b4b967f0e5938492434a04f7ea2e6c6d96d3e6c44700bc691821f82281e602
modules:
  - name: python3-attrs
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} --no-build-isolation attrs
    sources:
      - type: file
        # renovate: datasource=pypi depName=attrs
        url: https://files.pythonhosted.org/packages/64/b4/17d4b0b2a2dc85a6df63d1157e028ed19f90d4cd97c36717afef2bc2f395/attrs-26.1.0-py3-none-any.whl
        sha256: c647aa4a12dfbad9333ca4e71fe62ddc36f4e63b2d260a37a8b83d2f043ac309
    cleanup:
      - /lib/python*
  - name: python3-Jinja2
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} --no-build-isolation Jinja2
    sources:
      - type: file
        # renovate: datasource=pypi depName=Jinja2
        url: https://files.pythonhosted.org/packages/62/a1/3d680cbfd5f4b8f15abc1d571870c5fc3e594bb582bc3b64ea099db13e56/jinja2-3.1.6-py3-none-any.whl
        sha256: 85ece4451f492d0c13c5dd7c13a64681a86afae63a5f347908daf103ce6d2f67
      - type: file
        # renovate: datasource=pypi depName=MarkupSafe
        url: https://files.pythonhosted.org/packages/7e/99/7690b6d4034fffd95959cbe0c02de8deb3098cc577c67bb6a24fe5d7caa7/markupsafe-3.0.3.tar.gz
        sha256: 722695808f4b6457b320fdc131280796bdceb04ab50fe1795cd540799ebe1698
    cleanup:
      - /lib/python*
cleanup:
  - /include
  - /bin
  - /lib/pkgconfig
