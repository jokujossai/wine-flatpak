name: luajit
no-autogen: true
make-args:
  - BUILDMODE=dynamic
  - PREFIX=${FLATPAK_DEST}
make-install-args:
  - PREFIX=${FLATPAK_DEST}
sources:
  - type: git
    url: https://github.com/openresty/luajit2.git
    tag: v2.1-20260701
    commit: 2802aafe24b7c3b2892e616c2bee97a61e9c026e
    x-checker-data:
      type: git
      tag-pattern: ^v([\d.-]+)$
      stable-only: false
cleanup:
  - /bin
  - /include
  - /lib/pkgconfig
  - /share/man
