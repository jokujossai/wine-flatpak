name: luajit
no-autogen: true
make-args:
  - BUILDMODE=dynamic
  - PREFIX=${FLATPAK_DEST}
make-install-args:
  - PREFIX=${FLATPAK_DEST}
sources:
  - type: git
    url: https://github.com/openresty/luajit2.git
    tag: v2.1-20260606
    commit: a08100e7598451d4fd3a89a9826980f7c64117e7
    x-checker-data:
      type: git
      tag-pattern: ^v([\d.-]+)$
      stable-only: false
cleanup:
  - /bin
  - /include
  - /lib/pkgconfig
  - /share/man
