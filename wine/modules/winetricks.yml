name: winetricks
no-autogen: true
make-install-args:
  - PREFIX=${FLATPAK_DEST}
sources:
  - type: git
    # renovate: datasource=github-tags depName=Winetricks/winetricks versioning=loose extractVersion=^(?<version>\d+)$
    url: https://github.com/Winetricks/winetricks.git
    tag: '20260125'
    commit: b76e1ee79ac57d7aceb384f74518fc423265810c
modules:

  - name: 7zip
    buildsystem: simple
    subdir: CPP/7zip/Bundles/Alone2
    build-commands:
      - make -j $FLATPAK_BUILDER_N_JOBS -f makefile.gcc
      - install -Dm755 ./_o/7zz -t ${FLATPAK_DEST}/bin
      - ln -s ${FLATPAK_DEST}/bin/7zz ${FLATPAK_DEST}/bin/7za
      - ln -s ${FLATPAK_DEST}/bin/7zz ${FLATPAK_DEST}/bin/7z
    sources:
      - type: git
        # renovate: datasource=github-tags depName=ip7z/7zip versioning=loose extractVersion=^(?<version>[\d.]+)$
        url: https://github.com/ip7z/7zip.git
        tag: '26.00'
        commit: 839151eaaad24771892afaae6bac690e31e58384

  - name: cabextract
    # Built from the libmspack git checkout, which - unlike the cabextract.org.uk
    # release tarball - ships no pre-generated configure and must be bootstrapped
    # with autoreconf. cabextract's configure.ac calls AM_ICONV, a macro that
    # modern gettext no longer installs onto aclocal's search path (iconv() itself
    # lives in glibc, so no separate library is needed). Append a self-contained
    # AM_ICONV to acinclude.m4 - which aclocal scans automatically - so autoreconf
    # can expand it, then build by hand.
    buildsystem: simple
    subdir: cabextract
    build-commands:
      - cat ../cabextract-am-iconv.m4 >> acinclude.m4
      - autoreconf -fi
      - ./configure --prefix=${FLATPAK_DEST}
      - make -j $FLATPAK_BUILDER_N_JOBS
      - make install
    sources:
      - type: git
        # renovate: datasource=github-tags depName=kyz/libmspack versioning=loose extractVersion=^v(?<version>[\d.]+)$
        url: https://github.com/kyz/libmspack.git
        tag: v1.11
        commit: 305907723a4e7ab2018e58040059ffb5e77db837
      - type: inline
        dest-filename: cabextract-am-iconv.m4
        contents: |
          # Self-contained AM_ICONV, appended to cabextract's acinclude.m4 so autoreconf
          # can bootstrap the git checkout. Modern gettext no longer installs the classic
          # AM_ICONV macro onto aclocal's search path; on glibc, iconv() lives in libc.
          AC_DEFUN([AM_ICONV],
          [
            AC_CHECK_HEADERS([iconv.h])
            am_func_iconv=no
            am_lib_iconv=no
            AC_MSG_CHECKING([for iconv])
            AC_LINK_IFELSE(
              [AC_LANG_PROGRAM(
                [[#include <stdlib.h>
          #include <iconv.h>]],
                [[iconv_t cd = iconv_open("", "");
                  iconv(cd, NULL, NULL, NULL, NULL);
                  iconv_close(cd);]])],
              [am_func_iconv=yes])
            if test "$am_func_iconv" != yes; then
              am_save_LIBS="$LIBS"
              LIBS="$LIBS -liconv"
              AC_LINK_IFELSE(
                [AC_LANG_PROGRAM(
                  [[#include <stdlib.h>
          #include <iconv.h>]],
                  [[iconv_t cd = iconv_open("", "");
                    iconv(cd, NULL, NULL, NULL, NULL);
                    iconv_close(cd);]])],
                [am_func_iconv=yes; am_lib_iconv=yes])
              LIBS="$am_save_LIBS"
            fi
            AC_MSG_RESULT([$am_func_iconv])
            LIBICONV=
            LTLIBICONV=
            if test "$am_func_iconv" = yes; then
              AC_DEFINE([HAVE_ICONV], [1], [Define if you have the iconv() function.])
              if test "$am_lib_iconv" = yes; then
                LIBICONV="-liconv"
                LTLIBICONV="-liconv"
              fi
            fi
            AC_SUBST([LIBICONV])
            AC_SUBST([LTLIBICONV])
            AC_MSG_CHECKING([whether iconv() takes a const second argument])
            AC_COMPILE_IFELSE(
              [AC_LANG_PROGRAM(
                [[#include <stdlib.h>
          #include <iconv.h>
          extern
          #ifdef __cplusplus
          "C"
          #endif
          size_t iconv (iconv_t cd, char **inbuf, size_t *inbytesleft, char **outbuf, size_t *outbytesleft);
          ]],
                [[]])],
              [am_iconv_const=no],
              [am_iconv_const=yes])
            AC_MSG_RESULT([$am_iconv_const])
            if test "$am_iconv_const" = yes; then
              AC_DEFINE([ICONV_CONST], [const], [Define as const if the declaration of iconv() needs const.])
            else
              AC_DEFINE([ICONV_CONST], [], [Define as const if the declaration of iconv() needs const.])
            fi
          ])
