name: winetricks
no-autogen: true
make-install-args:
  - PREFIX=${FLATPAK_DEST}
sources:
  - type: git
    url: https://github.com/Winetricks/winetricks.git
    tag: '20260125'
    commit: b76e1ee79ac57d7aceb384f74518fc423265810c
    x-checker-data:
      type: git
      tag-pattern: ^(\d+)$
modules:

  - name: 7zip
    buildsystem: simple
    subdir: CPP/7zip/Bundles/Alone2
    build-commands:
      - make -j $FLATPAK_BUILDER_N_JOBS -f makefile.gcc
      - install -Dm755 ./_o/7zz -t ${FLATPAK_DEST}/bin
      - ln -s ${FLATPAK_DEST}/bin/7zz ${FLATPAK_DEST}/bin/7za
      - ln -s ${FLATPAK_DEST}/bin/7zz ${FLATPAK_DEST}/bin/7z
    sources:
      - type: git
        url: https://github.com/ip7z/7zip.git
        tag: '26.00'
        commit: 839151eaaad24771892afaae6bac690e31e58384
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$

  - name: cabextract
    subdir: cabextract
    sources:
      - type: git
        url: https://github.com/kyz/libmspack.git
        tag: v1.11
        commit: 305907723a4e7ab2018e58040059ffb5e77db837
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
